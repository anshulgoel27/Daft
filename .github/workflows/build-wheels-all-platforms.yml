name: Build Wheels Artifacts (Linux and macOS)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHON_VERSION: "python3.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.repository_owner == 'anshulgoel27' }}
    name: Build wheel (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            runner: ubuntu-latest
            maturin_args: --target aarch64-unknown-linux-gnu --compatibility manylinux_2_28 --zig
          - name: macos
            runner: macos-latest
            maturin_args: ""

    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Bootstrap build toolchain (fast path)
        run: |
          if command -v rustup > /dev/null 2>&1; then
            rustup --version
          else
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi

          if command -v uv > /dev/null 2>&1; then
            uv --version
          else
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Ensure Node.js is available
        run: |
          if command -v node > /dev/null 2>&1; then
            node --version
            npm --version
          else
            export NVM_DIR="$HOME/.nvm"
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
            # shellcheck disable=SC1090
            source "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22
            echo "$NVM_DIR/versions/node/$(nvm version 22)/bin" >> "$GITHUB_PATH"
            node --version
            npm --version
          fi

      - name: Build dashboard assets
        working-directory: src/daft-dashboard/frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Ensure Zig is available for Linux manylinux build
        if: matrix.platform.name == 'linux'
        run: |
          set -euo pipefail
          if command -v zig > /dev/null 2>&1; then
            zig version
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y xz-utils || true

          ARCH="$(uname -m)"
          if [[ "$ARCH" == "x86_64" ]]; then
            ZIG_ARCH="x86_64"
          elif [[ "$ARCH" == "aarch64" || "$ARCH" == "arm64" ]]; then
            ZIG_ARCH="aarch64"
          else
            echo "Unsupported architecture for Zig bootstrap: $ARCH" >&2
            exit 1
          fi

          ZIG_VERSION="0.13.0"
          ZIG_TARBALL="zig-linux-${ZIG_ARCH}-${ZIG_VERSION}.tar.xz"
          curl --retry 5 --retry-delay 2 --retry-connrefused -fsSL "https://ziglang.org/download/${ZIG_VERSION}/${ZIG_TARBALL}" -o zig.tar.xz
          tar -xJf zig.tar.xz
          echo "$PWD/zig-linux-${ZIG_ARCH}-${ZIG_VERSION}" >> "$GITHUB_PATH"

          zig version

      - name: Build wheel (single command)
        # Keep this path simple and deterministic to reduce CI overhead and debugging complexity.
        run: |
          set -euo pipefail
          PY_BIN="$(command -v python3 || command -v python)"
          "$PY_BIN" --version
          uvx --from maturin==1.13.3 maturin build --release --out dist -i "$PY_BIN" ${{ matrix.platform.maturin_args }}
        env:
          GITHUB_ACTIONS: "true"

      - name: Verify wheel outputs
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [[ ${#wheels[@]} -eq 0 ]]; then
            echo "No wheel files found in dist" >&2
            exit 1
          fi

          ls -lh dist/*.whl
          shasum -a 256 dist/*.whl

      - name: Upload wheels as pipeline artifacts
        run: |
          set -euo pipefail
          npm install --no-save @actions/artifact@2
          node .github/scripts/upload_wheels_artifact.cjs "wheels-${{ matrix.platform.name }}-${{ github.run_id }}" dist 14
