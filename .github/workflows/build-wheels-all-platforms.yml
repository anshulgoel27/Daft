name: Build Wheels Artifacts (Linux and macOS)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: write

env:
  PYTHON_VERSION: "python3.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.repository_owner == 'anshulgoel27' }}
    name: Build wheel (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            runner: ubuntu-latest
          - name: macos
            runner: macos-latest

    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Bootstrap build toolchain (fast path)
        run: |
          if command -v rustup > /dev/null 2>&1; then
            rustup --version
          else
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi

          if command -v uv > /dev/null 2>&1; then
            uv --version
          else
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Install sccache
        run: |
          SCCACHE_VERSION="0.10.0"
          OS="$(uname -s)"
          ARCH="$(uname -m)"

          if [[ "$OS" == "Linux" && "$ARCH" == "x86_64" ]]; then
            TARGET="x86_64-unknown-linux-musl"
          elif [[ "$OS" == "Darwin" && "$ARCH" == "arm64" ]]; then
            TARGET="aarch64-apple-darwin"
          elif [[ "$OS" == "Darwin" && "$ARCH" == "x86_64" ]]; then
            TARGET="x86_64-apple-darwin"
          else
            echo "Unsupported OS/ARCH for sccache: $OS/$ARCH" >&2
            exit 1
          fi

          URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-${TARGET}.tar.gz"
          curl --retry 5 --retry-delay 2 --retry-connrefused -fsSL "$URL" -o sccache.tar.gz
          tar -xzf sccache.tar.gz
          SCCACHE_DIR="$PWD/sccache-v${SCCACHE_VERSION}-${TARGET}"
          echo "$SCCACHE_DIR" >> "$GITHUB_PATH"
          export PATH="$SCCACHE_DIR:$PATH"
          "$SCCACHE_DIR/sccache" --version

      - name: Ensure Node.js is available
        run: |
          if command -v node > /dev/null 2>&1; then
            node --version
            npm --version
          else
            export NVM_DIR="$HOME/.nvm"
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
            # shellcheck disable=SC1090
            source "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22
            echo "$NVM_DIR/versions/node/$(nvm version 22)/bin" >> "$GITHUB_PATH"
            node --version
            npm --version
          fi

      - name: Build dashboard assets
        working-directory: src/daft-dashboard/frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Build wheel using local make target
        # Use a minimal, reproducible build env in CI (avoid full all-extras sync from Makefile .venv).
        run: |
          set -euo pipefail
          sccache --start-server || true

          PY_CMD="${PYTHON_VERSION}"
          if ! command -v "$PY_CMD" > /dev/null 2>&1; then
            # Ensure requested Python exists for Makefile's virtualenv creation.
            uv python install "${PY_CMD#python}"
          fi

          "$PY_CMD" --version
          rustup show active-toolchain || true
          mkdir -p dist

          build_ok=0

          set +e
          uv venv .venv -p "$PY_CMD"
          uv pip install --python .venv/bin/python maturin==1.13.3
          unset CONDA_PREFIX
          PYO3_PYTHON=.venv/bin/python .venv/bin/maturin build --release --out dist
          attempt_one_ec=$?
          set -e

          if [[ "$attempt_one_ec" -eq 0 ]]; then
            build_ok=1
          else
            echo "Pinned .venv maturin build failed; retrying via uvx maturin"
            uvx maturin --version || true
            uvx maturin build --release --out dist -i "$PY_CMD" && build_ok=1
          fi

          if [[ "$build_ok" -ne 1 ]]; then
            echo "All wheel build strategies failed" >&2
            exit 1
          fi
        env:
          GITHUB_ACTIONS: "true"
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          SCCACHE_CACHE_SIZE: "5G"

      - name: Show sccache stats
        run: sccache --show-stats || true

      - name: Upload wheels as draft release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RUN_TAG="wheel-build-${GITHUB_RUN_ID}"
          API="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases"

          release_json=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${API}/tags/${RUN_TAG}" || true)
          release_id=$(echo "$release_json" | python -c 'import json,sys; d=json.load(sys.stdin); print(d.get("id") or "")')

          if [[ -z "$release_id" ]]; then
            payload="{\"tag_name\":\"${RUN_TAG}\",\"name\":\"Wheel build ${GITHUB_RUN_ID}\",\"draft\":true,\"prerelease\":true}"
            release_json=$(curl -sS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${API}" -d "$payload")
            release_id=$(echo "$release_json" | python -c 'import json,sys; d=json.load(sys.stdin); print(d.get("id") or "")')
          fi

          if [[ -z "$release_id" ]]; then
            release_json=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${API}/tags/${RUN_TAG}")
          fi

          upload_url=$(echo "$release_json" | python -c 'import json,sys; d=json.load(sys.stdin); print(d.get("upload_url", "").split("{")[0])')
          html_url=$(echo "$release_json" | python -c 'import json,sys; d=json.load(sys.stdin); print(d.get("html_url", ""))')

          found=0
          for wheel in dist/*.whl; do
            [[ -f "$wheel" ]] || continue
            found=1
            name=$(basename "$wheel")
            curl -sS -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$wheel" \
              "${upload_url}?name=${name}" > /dev/null
          done

          if [[ "$found" -eq 0 ]]; then
            echo "No wheel files found in dist" >&2
            exit 1
          fi

          echo "Wheels uploaded to: ${html_url}"