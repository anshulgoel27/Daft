name: Build Wheels Artifacts (Linux and macOS)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - '**'

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  build:
    if: ${{ github.repository_owner == 'anshulgoel27' }}
    name: Build wheel (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            runner: ubuntu-latest
            command: make build-whl-cross BUILD_WHL_USE_ZIG=0 BUILD_WHL_TARGET=aarch64-unknown-linux-gnu BUILD_WHL_COMPATIBILITY=manylinux_2_28
          - name: macos
            runner: macos-latest
            command: make build-whl

    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Install uv, rust, and python
        uses: ./.github/actions/install
        with:
          python_version: ${{ env.PYTHON_VERSION }}

      - name: Ensure repository Rust toolchain is active
        run: |
          TOOLCHAIN=$(grep -E '^channel\s*=\s*"' rust-toolchain.toml | sed -E 's/.*"([^"]+)".*/\1/')
          rustup toolchain install "$TOOLCHAIN" --profile minimal --component rustfmt --component clippy
          rustup show active-toolchain
          rustup show active-toolchain | grep -q 'rust-toolchain.toml'

      - name: Ensure Node.js is available
        run: |
          if command -v node > /dev/null 2>&1; then
            node --version
            npm --version
          else
            export NVM_DIR="$HOME/.nvm"
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
            # shellcheck disable=SC1090
            source "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22
            echo "$NVM_DIR/versions/node/$(nvm version 22)/bin" >> "$GITHUB_PATH"
            node --version
            npm --version
          fi

      - name: Build dashboard assets
        working-directory: src/daft-dashboard/frontend
        run: |
          npm ci
          npm run build

      - name: Build wheel using local make command
        run: ${{ matrix.platform.command }}
        env:
          GITHUB_ACTIONS: "true"

      - name: Upload wheels as draft release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RUN_TAG="wheel-build-${GITHUB_RUN_ID}"
          API="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases"

          release_json=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${API}/tags/${RUN_TAG}" || true)
          release_id=$(echo "$release_json" | python -c 'import json,sys; d=json.load(sys.stdin); print(d.get("id") or "")')

          if [[ -z "$release_id" ]]; then
            payload="{\"tag_name\":\"${RUN_TAG}\",\"name\":\"Wheel build ${GITHUB_RUN_ID}\",\"draft\":true,\"prerelease\":true}"
            release_json=$(curl -sS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${API}" -d "$payload")
            release_id=$(echo "$release_json" | python -c 'import json,sys; d=json.load(sys.stdin); print(d.get("id") or "")')
          fi

          if [[ -z "$release_id" ]]; then
            release_json=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${API}/tags/${RUN_TAG}")
          fi

          upload_url=$(echo "$release_json" | python -c 'import json,sys; d=json.load(sys.stdin); print(d.get("upload_url", "").split("{")[0])')
          html_url=$(echo "$release_json" | python -c 'import json,sys; d=json.load(sys.stdin); print(d.get("html_url", ""))')

          found=0
          for wheel in target/wheels/*.whl; do
            [[ -f "$wheel" ]] || continue
            found=1
            name=$(basename "$wheel")
            curl -sS -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$wheel" \
              "${upload_url}?name=${name}" > /dev/null
          done

          if [[ "$found" -eq 0 ]]; then
            echo "No wheel files found in target/wheels" >&2
            exit 1
          fi

          echo "Wheels uploaded to: ${html_url}"